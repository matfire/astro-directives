pre-commit:
  parallel: true
  commands:
    format:
      run: pnpm format '{staged_files}'
      stage_fixed: true
    lint:
      run: pnpm lint:fix '{staged_files}'
      stage_fixed: true
    typecheck:
      run: pnpm typecheck

pre-push:
  commands:
    test:
      run: pnpm test

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
